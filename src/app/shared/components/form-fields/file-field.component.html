<div class="form-group">
  @if (label()) {
    <label [for]="id()">
      {{ label() }}
      @if (required()) {
        <span class="required">*</span>
      }
    </label>
  }

  @if (previewUrl()) {
    <img
      [src]="previewUrl()"
      alt="Vista previa"
      style="width:64px;height:64px;object-fit:cover;border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:8px;"
    />
  }

  <input
    [id]="id()"
    type="file"
    [accept]="accept()"
    [multiple]="multiple()"
    [class.is-invalid]="invalid()"
    (change)="handleChange($event)"
  />

  @if (fileName()) {
    <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:6px;">
      {{ fileName() }}
    </div>
  }

  @if (hint() && !(invalid() && errorMessage())) {
    <div style="font-size:0.78rem;color:var(--text-muted);margin-top:6px;">{{ hint() }}</div>
  }

  @if (invalid() && errorMessage()) {
    <div class="invalid-feedback">{{ errorMessage() }}</div>
  }
</div>
